<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>21:9 Bildzuschnitt</title>
<style>
body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:auto;background:#f0f0f0;font-family:sans-serif;padding:2rem;box-sizing:border-box}
#mainWrapper{display:flex;gap:2rem;align-items:flex-start}
#workspace{display:flex;flex-direction:column;align-items:center}
#container{position:relative;width:min(1000px,calc(100vw - 4rem));aspect-ratio:2000/857;background:#ddd;overflow:hidden;border-radius:8px;border:1px solid #888;box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:grab}
#container.dragging{cursor:grabbing}
canvas{display:block;user-select:none;pointer-events:none}
#canvas{width:100%;height:100%}
#placeholder{position:absolute;inset:0;display:flex;flex-direction:column;gap:.75rem;align-items:center;justify-content:center;color:#666;pointer-events:none;text-align:center}
#placeholderMain{font-size:1.2rem}
#placeholderHint{font-size:.95rem;line-height:1.4;color:#444;max-width:80%}
#controls{margin-top:1rem;display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
button{padding:.5rem 1rem;border:0;border-radius:4px;background:#007acc;color:#fff;font-size:1rem;cursor:pointer;transition:background .2s}
button:hover{background:#005fa3}
button:disabled{background:#b0b0b0;cursor:not-allowed}
#fileInput{display:none}
#previewSection{margin-top:1.5rem;width:320px;max-width:100%;display:flex;flex-direction:column;gap:.5rem;align-items:center}
#previewSection h2{margin:0;font-size:1.1rem;color:#333}
#previewCanvas{width:320px;height:180px;border:1px solid #888;border-radius:6px;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.1)}
.rangeLabel{display:flex;align-items:center;gap:.5rem;font-size:1rem;color:#333}
.rangeLabel input[type=range]{width:220px}
.miniBtn{padding:.35rem .6rem;font-size:.85rem;background:#e0e0e0;color:#333;border-radius:4px;border:1px solid #c0c0c0;cursor:pointer;transition:background .2s,color .2s}
.miniBtn:hover{background:#d0d0d0}
.miniBtn:active{background:#c0c0c0}
.miniBtn:disabled{background:#efefef;color:#9c9c9c;cursor:default}
#historyControls{display:flex;align-items:center;gap:.4rem;padding:.35rem .6rem;border:1px solid #cfcfcf;border-radius:4px;background:#fafafa}
#historyStatus{min-width:4rem;text-align:center;font-size:.9rem;color:#333}
</style>
</head>
<body>
<div id="mainWrapper">
  <div id="workspace">
    <div id="container" tabindex="0">
      <canvas id="canvas"></canvas>
      <div id="placeholder">
        <div id="placeholderMain">Bild hier einfügen, ablegen oder laden</div>
        <div id="placeholderHint">Bild mit der Maus verschieben. Scrollen für Zoom (für Feinzoom [Strg] gedrückt halten)</div>
      </div>
    </div>
    <div id="controls">
      <button id="loadBtn">Bild laden</button>
      <button id="saveBtn" disabled>Speichern</button>
      <button id="copyBtn" disabled>Ausschnitt kopieren</button>
      <label class="rangeLabel">Drehen:
        <input type="range" id="rotateRange" min="-45" max="45" value="0">
        <button id="resetRotation" type="button" class="miniBtn" aria-label="Rotation auf 0 Grad zurücksetzen">↺</button>
      </label>
      <div id="historyControls" aria-live="polite">
        <button id="historyPrev" type="button" class="miniBtn" aria-label="Voriges Bild anzeigen" disabled>←</button>
        <span id="historyStatus">– / –</span>
        <button id="historyNext" type="button" class="miniBtn" aria-label="Nächstes Bild anzeigen" disabled>→</button>
      </div>
    </div>
    <div id="previewSection">
      <h2>Vorschau 16:9</h2>
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*">
<script>
const TARGET_WIDTH=2000,TARGET_HEIGHT=857,TARGET_ASPECT=TARGET_WIDTH/TARGET_HEIGHT,SAVE_MIME='image/jpeg',SAVE_EXTENSION='jpg',SAVE_QUALITY=1,COPY_MIME='image/png',PREVIEW_WIDTH=320,PREVIEW_HEIGHT=180;
const container=document.getElementById('container'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),previewCanvas=document.getElementById('previewCanvas'),previewCtx=previewCanvas.getContext('2d'),fileInput=document.getElementById('fileInput'),loadBtn=document.getElementById('loadBtn'),saveBtn=document.getElementById('saveBtn'),copyBtn=document.getElementById('copyBtn'),rotateRange=document.getElementById('rotateRange'),resetRotationBtn=document.getElementById('resetRotation'),placeholder=document.getElementById('placeholder'),historyPrevBtn=document.getElementById('historyPrev'),historyNextBtn=document.getElementById('historyNext'),historyStatus=document.getElementById('historyStatus');
let img=new Image(),scale=1,minScale=1,offsetX=0,offsetY=0,rotation=0,viewWidth=1000,viewHeight=viewWidth/TARGET_ASPECT,dpr=window.devicePixelRatio||1,isDragging=false,startX=0,startY=0,filename='',imageHistory=[],historyIndex=-1,activeLoadToken=0;
const iw=()=>img.naturalWidth||img.width||0,ih=()=>img.naturalHeight||img.height||0;
function configure(c){c.imageSmoothingEnabled=true;c.imageSmoothingQuality='high'}
function resizeMainCanvas(){const r=container.getBoundingClientRect();viewWidth=Math.max(1,r.width);viewHeight=Math.max(1,r.height);dpr=window.devicePixelRatio||1;canvas.style.width=`${viewWidth}px`;canvas.style.height=`${viewHeight}px`;canvas.width=Math.max(1,Math.round(viewWidth*dpr));canvas.height=Math.max(1,Math.round(viewHeight*dpr));ctx.setTransform(canvas.width/viewWidth,0,0,canvas.height/viewHeight,0,0);configure(ctx)}
function resizePreviewCanvas(){previewCanvas.style.width=`${PREVIEW_WIDTH}px`;previewCanvas.style.height=`${PREVIEW_HEIGHT}px`;previewCanvas.width=Math.max(1,Math.round(PREVIEW_WIDTH*dpr));previewCanvas.height=Math.max(1,Math.round(PREVIEW_HEIGHT*dpr));previewCtx.setTransform(previewCanvas.width/PREVIEW_WIDTH,0,0,previewCanvas.height/PREVIEW_HEIGHT,0,0);configure(previewCtx)}
function resizeCanvases(){resizeMainCanvas();resizePreviewCanvas();if(iw()){updateMinScale();scale=Math.max(scale,minScale);clampOffsets()}draw();if(iw())updateHistoryState()}
window.addEventListener('resize',resizeCanvases);resizeCanvases();
function loadImageFile(file){if(!file)return;const reader=new FileReader();reader.onload=e=>addImageToHistory(e.target.result,file.name||'Bild');reader.readAsDataURL(file);fileInput.value=''}
function loadImageURL(url){if(!url)return;const name=url.startsWith('data:')?'Bild':(url.split('/').pop()||'Bild');addImageToHistory(url,name)}
function initImage(src,name,storedState){const loadToken=++activeLoadToken,targetIndex=historyIndex,nextImage=new Image();nextImage.crossOrigin='anonymous';nextImage.onload=()=>{if(loadToken!==activeLoadToken||targetIndex!==historyIndex)return;img=nextImage;if(storedState){rotation=typeof storedState.rotation==='number'?storedState.rotation:0;updateMinScale();scale=Math.max(minScale,storedState.scale||minScale);offsetX=typeof storedState.offsetX==='number'?storedState.offsetX:0;offsetY=typeof storedState.offsetY==='number'?storedState.offsetY:0}else{rotation=0;updateMinScale();scale=minScale;centerImage()}clampOffsets();rotateRange.value=Math.round(rotation*180/Math.PI);filename=(name||'export').replace(/\.[^/.]+$/,'');draw();saveBtn.disabled=false;copyBtn.disabled=false;placeholder.style.display='none';updateHistoryState()};nextImage.onerror=()=>alert('Das Bild konnte nicht geladen werden.');nextImage.src=src}
function updateMinScale(){const w=iw(),h=ih();if(!w||!h){minScale=1;return}const c=Math.abs(Math.cos(rotation)),s=Math.abs(Math.sin(rotation));minScale=Math.max(viewWidth/(w*c+h*s),viewHeight/(w*s+h*c))}
function centerImage(){offsetX=(viewWidth-iw()*scale)/2;offsetY=(viewHeight-ih()*scale)/2}
function clampOffsets(){const w=iw()*scale,h=ih()*scale;if(!w||!h)return;const c=Math.abs(Math.cos(rotation)),s=Math.abs(Math.sin(rotation)),bw=w*c+h*s,bh=w*s+h*c;let cx=offsetX+w/2,cy=offsetY+h/2;cx=bw<=viewWidth?viewWidth/2:Math.min(bw/2,Math.max(viewWidth-bw/2,cx));cy=bh<=viewHeight?viewHeight/2:Math.min(bh/2,Math.max(viewHeight-bh/2,cy));offsetX=cx-w/2;offsetY=cy-h/2}
function captureState(){return{scale,offsetX,offsetY,rotation}}
function updateHistoryState(){if(historyIndex>=0&&imageHistory[historyIndex])imageHistory[historyIndex].state=captureState()}
function updateHistoryControls(){const has=imageHistory.length>0;historyPrevBtn.disabled=!has||historyIndex<=0;historyNextBtn.disabled=!has||historyIndex>=imageHistory.length-1;historyStatus.textContent=has?`${historyIndex+1} / ${imageHistory.length}`:'– / –'}
function addImageToHistory(src,name){if(!src)return;updateHistoryState();imageHistory.push({src,name,state:null});historyIndex=imageHistory.length-1;initImage(src,name);updateHistoryControls()}
function navigateHistory(step){if(!imageHistory.length)return;const ni=historyIndex+step;if(ni<0||ni>=imageHistory.length)return;updateHistoryState();historyIndex=ni;const entry=imageHistory[historyIndex];initImage(entry.src,entry.name,entry.state);updateHistoryControls()}
function drawImageOnContext(c){const w=iw(),h=ih();if(!w||!h)return;c.save();c.translate(offsetX+w*scale/2,offsetY+h*scale/2);c.rotate(rotation);c.drawImage(img,-w*scale/2,-h*scale/2,w*scale,h*scale);c.restore()}
function draw(){ctx.clearRect(0,0,viewWidth,viewHeight);if(img.src&&iw()){drawImageOnContext(ctx);placeholder.style.display='none';updatePreview()}else{placeholder.style.display='flex';clearPreview()}}
function clearPreview(){previewCtx.clearRect(0,0,PREVIEW_WIDTH,PREVIEW_HEIGHT);previewCanvas.style.opacity=.4}
function updatePreview(){if(!img.src||!iw()){clearPreview();return}const pa=PREVIEW_WIDTH/PREVIEW_HEIGHT;let sw=viewHeight*pa,sh=viewHeight;if(sw>viewWidth){sw=viewWidth;sh=sw/pa}const sx=(viewWidth-sw)/2,sy=(viewHeight-sh)/2,px=canvas.width/viewWidth,py=canvas.height/viewHeight;previewCtx.clearRect(0,0,PREVIEW_WIDTH,PREVIEW_HEIGHT);previewCtx.drawImage(canvas,sx*px,sy*py,sw*px,sh*py,0,0,PREVIEW_WIDTH,PREVIEW_HEIGHT);previewCanvas.style.opacity=1}
loadBtn.addEventListener('click',()=>fileInput.click());fileInput.addEventListener('change',()=>loadImageFile(fileInput.files[0]));
rotateRange.addEventListener('input',()=>{rotation=parseFloat(rotateRange.value)*Math.PI/180;updateMinScale();scale=Math.max(scale,minScale);clampOffsets();draw();updateHistoryState()});
resetRotationBtn.addEventListener('click',()=>{rotateRange.value=0;rotation=0;updateMinScale();scale=Math.max(scale,minScale);clampOffsets();draw();updateHistoryState()});
container.addEventListener('click',()=>container.focus());
container.addEventListener('dragover',e=>{e.preventDefault();container.classList.add('dragging')});container.addEventListener('dragleave',()=>container.classList.remove('dragging'));
container.addEventListener('drop',e=>{e.preventDefault();container.classList.remove('dragging');const dt=e.dataTransfer;if(dt.files&&dt.files.length){loadImageFile(dt.files[0]);return}const url=dt.getData('text/uri-list')||dt.getData('text/plain');if(url&&url.match(/\.(jpe?g|png|gif|webp)(\?|$)/i)){loadImageURL(url);return}const html=dt.getData('text/html');if(html){const div=document.createElement('div');div.innerHTML=html;const imgEl=div.querySelector('img');if(imgEl&&imgEl.src)loadImageURL(imgEl.src)}});
container.addEventListener('paste',e=>{for(const item of e.clipboardData.items){if(item.kind==='file'&&item.type.startsWith('image/')){loadImageFile(item.getAsFile());return}}});
container.addEventListener('mousedown',e=>{if(!img.src)return;isDragging=true;startX=e.clientX-offsetX;startY=e.clientY-offsetY;container.classList.add('dragging')});
window.addEventListener('mousemove',e=>{if(!isDragging)return;offsetX=e.clientX-startX;offsetY=e.clientY-startY;clampOffsets();draw();updateHistoryState()});
window.addEventListener('mouseup',()=>{isDragging=false;container.classList.remove('dragging');updateHistoryState()});
container.addEventListener('wheel',e=>{if(!img.src)return;e.preventDefault();const sens=e.ctrlKey?.00015:.001,oldScale=scale,delta=-e.deltaY*sens;scale=Math.max(minScale,scale*(1+delta));const r=container.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;offsetX=mx-(mx-offsetX)*(scale/oldScale);offsetY=my-(my-offsetY)*(scale/oldScale);clampOffsets();draw();updateHistoryState()},{passive:false});
function createOutputCanvas(){const out=document.createElement('canvas');out.width=TARGET_WIDTH;out.height=TARGET_HEIGHT;const octx=out.getContext('2d');configure(octx);octx.fillStyle='#fff';octx.fillRect(0,0,TARGET_WIDTH,TARGET_HEIGHT);octx.scale(TARGET_WIDTH/viewWidth,TARGET_HEIGHT/viewHeight);drawImageOnContext(octx);return out}
function handleExportError(error){console.error('Export failed',error);alert('Der Ausschnitt konnte nicht exportiert werden. Bei externen Bildern liegt das oft an CORS/Rechte-Beschränkungen. Bitte das Bild lokal speichern und erneut laden.')}
saveBtn.addEventListener('click',()=>{try{const out=createOutputCanvas();out.toBlob(blob=>{if(!blob){handleExportError(new Error('Leerer Export-Blob'));return}const link=document.createElement('a');link.download=`${filename}_zuschnitt_${TARGET_WIDTH}x${TARGET_HEIGHT}.${SAVE_EXTENSION}`;link.href=URL.createObjectURL(blob);link.click();URL.revokeObjectURL(link.href)},SAVE_MIME,SAVE_QUALITY)}catch(error){handleExportError(error)}});
function copyCrop(){if(!img.src)return;try{const out=createOutputCanvas();out.toBlob(async blob=>{try{if(!blob)throw new Error('Leerer Export-Blob');await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})])}catch(error){handleExportError(error)}},COPY_MIME)}catch(error){handleExportError(error)}}
copyBtn.addEventListener('click',copyCrop);
historyPrevBtn.addEventListener('click',()=>navigateHistory(-1));
historyNextBtn.addEventListener('click',()=>navigateHistory(1));
</script>
</body>
</html>
